name: Update Location Data

on:
  schedule:
    # Runs daily at 8am PT (3pm UTC)
    - cron: '0 15 * * *'
  workflow_dispatch: # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::readr
            any::tidygeocoder
            any::dplyr

      - name: Run geocode script
        run: Rscript scripts/geocode.R

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- data/locations.csv 2>/dev/null && ! git ls-files --others --exclude-standard | grep -q "data/locations.csv"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/locations.csv
          git commit -m "Update location data from Google Sheet"
          git push
